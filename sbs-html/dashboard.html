
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Tahoma;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:220px;
    background:#111;
    height:100vh;
    padding:20px;
}
.sidebar h2{
    color:#f2c94c;
}

/* Main */
.main{
    flex:1;
    padding:20px;
}

/* Top */
.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

/* Inputs */
input{
    padding:10px;
    margin:5px;
    background:#1a1a1a;
    border:none;
    color:#fff;
}

/* Buttons */
button{
    background:#f2c94c;
    border:none;
    padding:10px;
    cursor:pointer;
}

/* Table */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
td,th{
    padding:10px;
    border-bottom:1px solid #222;
}
th{
    color:#f2c94c;
}

/* Chart */
.chart-box{
    width:300px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>OMAY</h2>
<p>لوحة التحكم</p>
</div>

<div class="main">

<div class="top">
<h2>إدارة العملاء</h2>
<button onclick="logout()">تسجيل خروج</button>
</div>

<!-- إضافة -->
<input id="name" placeholder="اسم العميل">
<input id="service" placeholder="الخدمة">
<button onclick="addClient()">إضافة</button>

<!-- بحث -->
<input id="search" placeholder="بحث..." oninput="filterClients()">

<!-- جدول -->
<table>
<thead>
<tr>
<th>الاسم</th>
<th>الخدمة</th>
<th>حذف</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<!-- Chart -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔴 حط بياناتك هنا */
const firebaseConfig = {
  apiKey: "AIzaSyDab-8s-bk56o1r4eMF6Dysj85cxh6VSJY",
  authDomain: "omay-1.firebaseapp.com",
  projectId: "omay-1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, user=>{

    // ✅ أول دخول بعد login
    if (sessionStorage.getItem("justLoggedIn")) {
        sessionStorage.removeItem("justLoggedIn");
        return;
    }

    // ❌ لو مفيش مستخدم
    if(!user){
        location.href="admin.html";
    }

});
import { setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

setPersistence(auth, browserSessionPersistence);

/* حماية */


/* إضافة */
window.addClient = async function(){

    let n = document.getElementById("name").value.trim();
    let s = document.getElementById("service").value.trim();

    if(!n || !s){
        alert("اكتب البيانات");
        return;
    }

    try{
        await addDoc(collection(db,"clients"),{
            name:n,
            service:s
        });

        alert("تمت الإضافة ✅");

        document.getElementById("name").value="";
        document.getElementById("service").value="";

        load();

    }catch(e){
        console.log("ERROR:", e);
        alert("في مشكلة في الإضافة ❌");
    }
}
/* تحميل */
async function load(){
    data.innerHTML="";

    const snapshot = await getDocs(collection(db,"clients"));

    let count = {};

    snapshot.forEach(docu=>{
        let d = docu.data();

        data.innerHTML+=`
        <tr>
        <td>${d.name}</td>
        <td>${d.service}</td>
        <td><button onclick="del('${docu.id}')">X</button></td>
        </tr>`;

        count[d.service]=(count[d.service]||0)+1;
    });

    drawChart(count);
}

/* حذف */
window.del = async function(id){
    await deleteDoc(doc(db,"clients",id));
    load();
}

/* فلترة */
window.filterClients = function(){
    let val = search.value.toLowerCase();

    document.querySelectorAll("#data tr").forEach(r=>{
        r.style.display =
        r.innerText.toLowerCase().includes(val) ? "" : "none";
    });
}

/* Chart */
let chart;

function drawChart(obj){
    let labels = Object.keys(obj);
    let values = Object.values(obj);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type:"doughnut",
        data:{
            labels:labels,
            datasets:[{
                data:values
            }]
        },
        options:{
            cutout:"70%"
        }
    });
}

/* Logout */
window.logout = function(){
    signOut(auth).then(()=>{
        location.href="admin.html";
    });
}

load();
setTimeout(()=>{
    alert("انتهت الجلسة ⏳");
    signOut(auth).then(()=>{
        location.href="admin.html";
    });
}, 5 * 60 * 1000); // 5 دقايق

let timer;

function resetTimer(){
    clearTimeout(timer);
    timer = setTimeout(()=>{
        alert("تم تسجيل الخروج بسبب عدم النشاط 💤");
        signOut(auth).then(()=>{
            location.href="admin.html";
        });
    }, 5 * 60 * 1000);
}

// أي حركة من المستخدم
window.onload = resetTimer;
document.onmousemove = resetTimer;
document.onkeydown = resetTimer;
document.onclick = resetTimer;
</script>

</body>
</html>
